<!DOCTYPE html>

<head></head>
<title>Halaman Admin</title>
<link rel="stylesheet" href="./admin.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <!-- CRUD -->
    <div class="container mt-5">
        <div class="card shadow-lg p-4">
            <h1 class="text-center mb-4">
                Book Management System
            </h1>
            <div class="row mb-4 align-items-center">
                <div class="row mb-4 align-items-center">
    <div class="col-md-6">
        <input type="text" id="searchInput" class="form-control" placeholder="Cari buku ....">
        <small class="text-muted d-block mt-1 ms-2" style="color: rgb(170, 168, 168);">
            <i class="bi bi-exclamation-circle"></i>
            Cari buku berdasarkan ID, Title, Genre, atau Language
        </small>
    </div>
    <div class="col-md-6 text-end">
        <button class="btn btn-success px-4" data-bs-toggle="modal" data-bs-target="#bookModal">
            <i class="bi bi-plus-circle"></i>
            Add Book
        </button>
    </div>
</div>

            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Image</th>
                        <th>Image URL</th>
                        <th>Title</th>
                        <th>Genre</th>
                        <th>Language</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="bookTableBody">
                    <!-- Diisi otomatis oleh JavaScript -->
                </tbody>
            </table>

            <!-- Modal Add/Edit Book -->
            <div class="modal fade" id="bookModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">
                                <i class="bi bi-book-half"></i>
                                Add / Edit Book
                            </h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal">
                            </button>
                        </div>
                        <div class="modal-body">
                            <form id="bookForm">
                                <div class="mb-3">
                                    <label class="form-label">Book ID</label>
                                    <input type="text" id="bookId" class="form-control" placeholder="book-1" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Title</label>
                                    <input type="text" id="bookTitle" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Image URL</label>
                                    <input type="url" id="bookImageUrl" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Genre</label>
                                    <input type="text" id="bookGenre" class="form-control"
                                        placeholder="Fantasy, Adventure" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label">Language</label>
                                    <select id="bookLanguage" class="form-select" required>
                                        <option value="">Pilih Bahasa</option>
                                        <option value="Indonesia">Indonesia</option>
                                        <option value="English">English</option>
                                        <option value="Japanese">Japanese</option>
                                        <option value="Korean">Korean</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-success w-100">
                                    <i class="bi bi-save"></i>
                                    Save Book
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- end CRUD -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="admin.js"></script>
</body>

</html>
