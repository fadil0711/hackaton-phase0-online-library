<!DOCTYPE html>

<head></head>
<title>Halaman Admin</title>
<link rel="stylesheet" href="./admin.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <!-- CRUD -->
    <div class="container mt-5">

        <div class="card shadow-lg p-4">

            <h1 class="text-center mb-4">
                CRUD Buku
            </h1>

            <div class="text-center mb-4">

                <button class="btn btn-success">
                    <i class="bi bi-plus-circle"></i>
                    Add Book
                </button>

            </div>

            <div class="row mb-3">

                <div class="col-md-4">
                    <input type="text" class="form-control" placeholder="Cari Buku...">
                </div>

            </div>

            <table class="table table-hover align-middle">

                <thead class="table-dark">

                    <tr>

                        <th>ID</th>

                        <th>Image</th>

                        <th>Image URL</th>

                        <th>Title</th>

                        <th>Genre</th>

                        <th>Language</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>book-1</td>

                        <td>

                            <img src="https://covers.openlibrary.org/b/isbn/9780747532699-L.jpg" width="70">

                        </td>

                        <td>

                            https://covers.openlibrary.org/b/isbn/9780747532699-L.jpg

                        </td>

                        <td>

                            Harry Potter and the Philosopher's Stone

                        </td>

                        <td>

                            Fantasy, Young Adult, Adventure

                        </td>

                        <td>

                            English

                        </td>

                        <td>

                            <button class="btn btn-warning btn-sm">

                                Edit

                            </button>

                            <button class="btn btn-danger btn-sm">

                                Delete

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>
    <!-- end CRUD -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
