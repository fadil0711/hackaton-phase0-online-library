<!DOCTYPE html>
<html>

<head>
    <title>Halaman login</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="logo-section">
    <h1 class="logo-title">📚 BukuKu</h1>
    <p class="logo-subtitle">
        Temukan Ribuan Buku Favoritmu
    </p>
</div>
    <!-- card container -->
    <div class="login-container">
        <div class="login-card">

            <h1 class="text-center mb-4">Login</h1>

            <div class="mb-4">
                <label>Email</label>
                <!-- Menambahkan id="email" dan type="text" -->
                <input type="text" id="email" class="form-control" placeholder="Masukkan Email">
            </div>

            <div class="mb-3">
                <label>Password</label>
                <!-- Menambahkan id="password" -->
                <input type="password" id="password" class="form-control" placeholder="Masukkan Password">
            </div>

            <div class="d-flex justify-content-between mb-4">
                
            </div>

            <!-- Mengubah tag <a> menjadi <button> dengan id="loginBtn" -->
            <button type="button" id="loginBtn" class="btn btn-login w-100">
                Login
            </button>

        </div>
    </div>
    <!-- end card container -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
        
    <!-- Menghubungkan ke file JavaScript eksternal -->
    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
